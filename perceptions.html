<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OER Student Perceptions</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: "Segoe UI";
  padding: 15px;
  color: #505859;
}
.card {
  margin-bottom: 20px;
}
</style>
</head>

<body>

<h2>OER Student Perceptions</h2>
<p>Spring 2026 • 1,171 responses across 178 sections</p>

<div class="card">
  <h3>Key Takeaways</h3>
  <ul>
    <li>88% overall positive</li>
    <li>57% concerned about cost</li>
    <li>37% skipped buying materials</li>
  </ul>
</div>

<canvas id="barriers"></canvas>
<canvas id="quality"></canvas>

<script>
new Chart(document.getElementById('barriers'), {
  type:'bar',
  data:{
    labels:[
      "Did not purchase",
      "Fewer courses",
      "Poor grade",
      "Delayed",
      "Withdraw",
      "Failed"
    ],
    datasets:[{
      data:[405,251,197,183,114,61]
    }]
  }
});

new Chart(document.getElementById('quality'), {
  type:'bar',
  data:{
    labels:["Inferior","Comparable","Superior"],
    datasets:[{data:[120,615,436]}]
  }
});
</script>

</body>
</html>
