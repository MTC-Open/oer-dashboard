<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTC OER Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: "Segoe UI", Arial, sans-serif;
  margin: 0;
  background: #ffffff;
  color: #505859;
}

.container {
  padding: 15px;
  max-width: 1200px;
  margin: auto;
}

h1 {
  color: #0c436a;
}

/* KPI */
.kpis {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
  gap: 15px;
}

.kpi {
  background: #f5f7f8;
  padding: 15px;
  border-radius: 10px;
}

.kpi .value {
  font-size: 28px;
  font-weight: bold;
  color: #0c436a;
}

.card {
  margin-top: 20px;
  padding: 15px;
  border-radius: 10px;
  background: #f9fbfc;
}

canvas {
  width: 100% !important;
}

/* Table */
table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
  text-align: left;
}

th {
  background: #0c436a;
  color: white;
}
</style>
</head>

<body>
<div class="container">

<h1>Open Education Data & Impact Dashboard</h1>

<div class="kpis">
  <div class="kpi">
    <div id="enrollment"></div>
    <div>Total Enrollment</div>
  </div>
  <div class="kpi">
    <div id="savings"></div>
    <div>Estimated Savings</div>
  </div>
  <div class="kpi">
    <div id="courses"></div>
    <div>OER Courses</div>
  </div>
  <div class="kpi">
    <div id="sections"></div>
    <div>Avg Sections / Term</div>
  </div>
</div>

<div class="card">
  <h3>OER Implementation Pipeline</h3>
  <canvas id="pipelineChart"></canvas>
</div>

<div class="card">
  <h3>Top 10 Courses by Savings</h3>
  <canvas id="savingsChart"></canvas>
</div>

<div class="card">
  <h3>Top Courses by Students Impacted</h3>
  <canvas id="studentsChart"></canvas>
</div>

<div class="card">
  <h3>Course Impact Table</h3>
  <table id="table">
    <thead>
      <tr>
        <th>Course</th>
        <th>Department</th>
        <th>Enrollment</th>
        <th>Status</th>
        <th>Savings</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

</div>

<script>
fetch('data/oer-data.json')
.then(res => res.json())
.then(data => {

document.getElementById('enrollment').innerHTML =
  data.kpis.enrollment.toLocaleString();

document.getElementById('savings').innerHTML =
  "$" + data.kpis.savings.toLocaleString();

document.getElementById('courses').innerHTML =
  data.kpis.courses;

document.getElementById('sections').innerHTML =
  data.kpis.avgSections;

/* Top Courses */
const top = data.courses.sort((a,b)=>b.savings-a.savings).slice(0,10);

new Chart(document.getElementById('savingsChart'), {
  type: 'bar',
  data: {
    labels: top.map(x=>x.course),
    datasets: [{data: top.map(x=>x.savings), backgroundColor:'#238cc1'}]
  },
  options: { indexAxis:'y' }
});

new Chart(document.getElementById('studentsChart'), {
  type: 'bar',
  data: {
    labels: top.map(x=>x.course),
    datasets: [{data: top.map(x=>x.enrollment), backgroundColor:'#79bc43'}]
  },
  options: { indexAxis:'y' }
});

/* Pipeline */
new Chart(document.getElementById('pipelineChart'), {
  type: 'doughnut',
  data: {
    labels: data.status.map(x=>x.status),
    datasets: [{data:data.status.map(x=>x.count)}]
  }
});

/* Table */
const tbody = document.querySelector("#table tbody");

data.courses.forEach(c=>{
  tbody.innerHTML += `
  <tr>
    <td>${c.course}</td>
    <td>${c.department}</td>
    <td>${c.enrollment}</td>
    <td>${c.status}</td>
    <td>$${c.savings.toLocaleString()}</td>
  </tr>`;
});

});
</script>

</body>
</html>
